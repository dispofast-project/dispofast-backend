version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: dispofast-db
    environment:
      POSTGRES_DB: dispofast
      POSTGRES_USER: dispofast
      POSTGRES_PASSWORD: dispofast
    ports:
      - "5433:5432"
    volumes:
      - dispofast_data:/var/lib/postgresql/data
    networks:
      - dispofast-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dispofast-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dispofast@admin.com
      PGADMIN_DEFAULT_PASSWORD: dispofast
    ports:
      - "5050:80"
    volumes:
      - dispofast_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - dispofast-network
    
  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - dispofast-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - dispofast-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password123;
      mc mb --ignore-existing local/dispofast-price-lists;
      mc mb --ignore-existing local/dispofast-legal-docs;
      mc mb --ignore-existing local/dispofast-product-images;
      mc mb --ignore-existing local/dispofast-invoices;
      mc anonymous set download local/dispofast-product-images;
      echo 'Buckets initialized successfully';
      "
    restart: "no"

volumes:
  dispofast_data:
  dispofast_pgadmin_data:
  minio_data:

networks:
  dispofast-network:
